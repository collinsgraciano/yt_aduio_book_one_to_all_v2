# ═══════════════════════════════════════════════════════════════
# 有声书 YouTube 频道管理系统 — Docker Compose
# ═══════════════════════════════════════════════════════════════
# 包含 Web 应用 + PostgreSQL 两个服务
# 用法：
#   docker-compose up -d --build
# ═══════════════════════════════════════════════════════════════

services:
  # ─── PostgreSQL 数据库 ───
  postgres:
    image: postgres:16-alpine
    container_name: audiobook_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: audiobook
      POSTGRES_USER: audiobook_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_strong_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audiobook_app -d audiobook"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - audiobook_net

  # ─── Web 应用（FastAPI + 后台线程，无需 Celery/Redis）───
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: audiobook_web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      - DATABASE_URL=postgresql://audiobook_app:${POSTGRES_PASSWORD:-changeme_strong_password}@postgres:5432/audiobook
      - SECRET_KEY=${SECRET_KEY:-dev_secret_key_change_in_production}
      - BASE_URL=${BASE_URL:-http://localhost:59386}
      - APP_PASSWORD=${APP_PASSWORD:-inriynisse}
      - OUTPUT_ROOT=/data/output
      - MUSIC_DIR=/data/music
      - UVICORN_WORKERS=1
      - DOWNLOAD_WORKERS=2
      - DEEPFILTER_WORKERS=1
    volumes:
      - output_data:/data/output
      - ./data/music:/data/music
      - ./pipeline:/app/pipeline:ro
      - ./data/deepfilter:/opt/deepfilter
    ports:
      - "59386:59386"
    networks:
      - audiobook_net
    deploy:
      resources:
        limits:
          cpus: "0.80"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  output_data:
  postgres_data:

networks:
  audiobook_net:
    driver: bridge
